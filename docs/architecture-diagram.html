<title>Aulendil System Architecture</title>
<style>
  :root {
    --cat-entry: #1679fa;
    --cat-context: #2ecc40;
    --cat-mode: #ff7f00;
    --cat-process: #8139ee;
    --cat-enforce: #e53935;
    --cat-output: #00897b;
    --bg: #0f1117;
    --surface: #181b24;
    --text: #e8eaed;
    --text-dim: #9aa0a6;
    --text-label: #bdc1c6;
    --border: #2d3139;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Pro Display', -apple-system, 'Segoe UI', sans-serif;
    overflow: auto;
  }
  header {
    padding: 24px 32px 12px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  header .version {
    font-size: 12px; color: var(--text-dim); background: var(--surface);
    padding: 3px 10px; border-radius: 12px; border: 1px solid var(--border);
  }
  .diagram-wrap { padding: 0 16px 32px; overflow: auto; }
  svg text { font-family: 'SF Pro Display', -apple-system, 'Segoe UI', sans-serif; }
  .node:hover rect { filter: brightness(1.35); cursor: pointer; }
  .cluster:hover > rect:first-of-type { filter: brightness(1.1); }
  .tooltip {
    position: fixed; background: #23262f; color: var(--text); font-size: 12px;
    padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border);
    pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 100;
    max-width: 360px; white-space: nowrap;
  }
  .tooltip.visible { opacity: 1; }
</style>
</head>

<div class="tooltip" id="tooltip"></div>
<script>
const tt = document.getElementById('tooltip');
document.querySelectorAll('[data-tip]').forEach(el => {
  el.addEventListener('mouseenter', () => { tt.textContent = el.getAttribute('data-tip'); tt.classList.add('visible'); });
  el.addEventListener('mousemove', e => { tt.style.left = (e.clientX + 14) + 'px'; tt.style.top = (e.clientY + 14) + 'px'; });
  el.addEventListener('mouseleave', () => tt.classList.remove('visible'));
});
</script>
